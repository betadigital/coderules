_schema-version: 3.3.0
ID: SA-Power-CRR
version: 1.0.0
description: "SAP CAP App with Fiori UIs for SA Power code review (Managed AppRouter)"
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  # --------------------------------------------------
  # 1. CAP Backend Server
  # --------------------------------------------------
  - name: SA-Power-CRR-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: SA-Power-CRR-auth
      - name: SA-Power-CRR-db
      - name: SA-Power-CRR-destination

  # --------------------------------------------------
  # 2. Database Deployer
  # --------------------------------------------------
  - name: SA-Power-CRR-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: SA-Power-CRR-db

  # --------------------------------------------------
  # 3. HTML5 Application Deployer
  # --------------------------------------------------
  - name: SA-Power-CRR-app-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: srv-api
      - name: SA-Power-CRR-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: OAuth2UserTokenExchange
                TokenServiceInstanceName: SA-Power-CRR-auth
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
              - Name: ui5
                URL: https://ui5.sap.com
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
    build-parameters:
      build-result: resources
      requires:
        - name: codereviewrulesbaseruleapp
          artifacts:
            - baseruleapp.zip
          target-path: resources/
        - name: codereviewrulesuserrulesapp
          artifacts:
            - userrulesapp.zip
          target-path: resources/
        - name: codereviewruleslogsapp
          artifacts:
            - logsapp.zip
          target-path: resources/
        - name: codereviewrulesobjecttypes
          artifacts:
            - objecttypes.zip
          target-path: resources/
        - name: codereviewrulestransportoutcomesapp
          artifacts:
            - transportoutcomesapp.zip
          target-path: resources/

  # --------------------------------------------------
  # 4. Launchpad Destinations (Crucial for Managed AppRouter)
  # --------------------------------------------------
  - name: SA-Power-CRR-destinations
    type: com.sap.application.content
    requires:
      - name: SA-Power-CRR-html5-repo-host
        parameters:
          service-key:
            name: SA-Power-CRR-html5-repo-host-key
      - name: srv-api
      - name: SA-Power-CRR-auth
        parameters:
          service-key:
            name: SA-Power-CRR-auth-key
      - name: SA-Power-CRR-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            # Connects Launchpad to your UI files
            - Name: SA-Power-CRR-html5-repository
              ServiceInstanceName: SA-Power-CRR-html5-repo-host
              ServiceKeyName: SA-Power-CRR-html5-repo-host-key
              sap.cloud.service: crr.cap.service
            # Connects Launchpad to your Auth/Backend logic
            - Authentication: OAuth2UserTokenExchange
              Name: SA-Power-CRR_uaa
              ServiceInstanceName: SA-Power-CRR-auth
              ServiceKeyName: SA-Power-CRR-auth-key
              sap.cloud.service: crr.cap.service

  # --------------------------------------------------
  # 5. UI5 App Build Modules
  # --------------------------------------------------
  - name: codereviewrulesbaseruleapp
    type: html5
    path: app/baseruleapp
    build-parameters:
      build-result: dist
      builder: custom
      commands: [npm install, npm run build:cf]

  - name: codereviewrulesuserrulesapp
    type: html5
    path: app/userrulesapp
    build-parameters:
      build-result: dist
      builder: custom
      commands: [npm install, npm run build:cf]

  - name: codereviewruleslogsapp
    type: html5
    path: app/logsapp
    build-parameters:
      build-result: dist
      builder: custom
      commands: [npm install, npm run build:cf]

  - name: codereviewrulesobjecttypes
    type: html5
    path: app/objecttypes
    build-parameters:
      build-result: dist
      builder: custom
      commands: [npm install, npm run build:cf]

  - name: codereviewrulestransportoutcomesapp
    type: html5
    path: app/transportoutcomesapp
    build-parameters:
      build-result: dist
      builder: custom
      commands: [npm install, npm run build:cf]

resources:
  # --------------------------------------------------
  # XSUAA Service
  # --------------------------------------------------
  - name: SA-Power-CRR-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        tenant-mode: dedicated
        xsappname: SA-Power-CRR
        oauth2-configuration:
          redirect-uris:
            - https://*.cfapps.*.hana.ondemand.com/login/callback
            - https://*.${default-domain}/login/callback
        # Note: the app-api redirect URI was removed since we no longer have a standalone approuter
        role-collections:
          - name: "RuleAdmin (SA-Power-CRR ${org}-${space})"
            description: "generated"
            role-template-references: ["$XSAPPNAME.RuleAdmin"]
          - name: "RuleReader (SA-Power-CRR ${org}-${space})"
            description: "generated"
            role-template-references: ["$XSAPPNAME.RuleReader"]
          - name: "RuleCreator (SA-Power-CRR ${org}-${space})"
            description: "generated"
            role-template-references: ["$XSAPPNAME.RuleCreator"]
          - name: "RuleM2M (SA-Power-CRR ${org}-${space})"
            description: "generated"
            role-template-references: ["$XSAPPNAME.RuleM2m"]
      # Generate service key for the Fiori Launchpad destination to consume
      service-keys:
        - name: SA-Power-CRR-auth-key

  # --------------------------------------------------
  # HANA Database
  # --------------------------------------------------
  - name: SA-Power-CRR-db
    type: org.cloudfoundry.managed-service
    parameters:
      service: hana
      service-plan: hdi-shared

  # --------------------------------------------------
  # Destination Service
  # --------------------------------------------------
  - name: SA-Power-CRR-destination
    type: org.cloudfoundry.managed-service
    requires:
      - name: SA-Power-CRR-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: OAuth2UserTokenExchange
                TokenServiceInstanceName: SA-Power-CRR-auth
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true

  # --------------------------------------------------
  # HTML5 Repo Host
  # --------------------------------------------------
  - name: SA-Power-CRR-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  # Note: SA-Power-CRR-html5-runtime resource is removed.
  # When using SAP Build Workzone/Fiori Launchpad, the platform provides the runtime.
